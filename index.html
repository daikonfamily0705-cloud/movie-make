<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Runway Multi-Clip Video Maker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: rgba(255,255,255,0.08);
    --border-active: rgba(255,255,255,0.2);
    --text: #e8e8ec;
    --muted: #6b6b7a;
    --accent: #7fff6e;
    --accent2: #6eb5ff;
    --danger: #ff6e6e;
    --warn: #ffbe6e;
    --mono: 'DM Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Layout */
  .shell {
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: 56px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* Header */
  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    gap: 16px;
  }
  .logo {
    font-family: var(--display);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--accent);
  }
  .logo span { color: var(--muted); font-weight: 400; }
  .header-status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
  }
  .dot.ok { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

  /* Sidebar */
  aside {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  label { display: block; margin-bottom: 4px; font-size: 11px; color: var(--muted); }

  input[type="text"], input[type="password"], input[type="number"], textarea, select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--border-active); }
  textarea { resize: vertical; min-height: 60px; }

  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }

  /* Transition toggle */
  .toggle-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .toggle-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    padding: 7px 6px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .toggle-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(127,255,110,0.06);
  }

  /* Clip list */
  .clip-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .clip-row {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    position: relative;
  }
  .clip-row-header {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .clip-num {
    font-size: 10px;
    color: var(--muted);
    min-width: 20px;
  }
  .clip-row textarea {
    font-size: 11px;
    min-height: 48px;
    padding: 6px 8px;
  }
  .clip-row-controls {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .clip-row-controls select {
    flex: 1;
    font-size: 11px;
    padding: 5px 7px;
  }
  .clip-status {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--surface);
    color: var(--muted);
    white-space: nowrap;
  }
  .clip-status.running { color: var(--warn); background: rgba(255,190,110,0.1); }
  .clip-status.done { color: var(--accent); background: rgba(127,255,110,0.1); }
  .clip-status.error { color: var(--danger); background: rgba(255,110,110,0.1); }

  .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    margin-left: auto;
    transition: color 0.15s;
  }
  .del-btn:hover { color: var(--danger); }

  .add-btn {
    background: none;
    border: 1px dashed var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    padding: 8px;
    cursor: pointer;
    width: 100%;
    text-align: center;
    transition: all 0.15s;
  }
  .add-btn:hover { border-color: var(--border-active); color: var(--text); }

  /* Main area */
  main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .main-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
  }

  .run-btn {
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    padding: 8px 18px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .run-btn:hover { opacity: 0.85; }
  .run-btn:disabled { opacity: 0.35; cursor: default; }

  .merge-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .merge-btn:hover { border-color: var(--border-active); }
  .merge-btn:disabled { opacity: 0.3; cursor: default; }

  .progress-wrap {
    flex: 1;
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s;
  }
  .progress-label {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* Log panel */
  .log-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .log-line {
    font-size: 12px;
    line-height: 1.7;
    display: flex;
    gap: 10px;
  }
  .log-time { color: var(--muted); min-width: 60px; }
  .log-msg { color: var(--text); }
  .log-line.ok .log-msg { color: var(--accent); }
  .log-line.err .log-msg { color: var(--danger); }
  .log-line.warn .log-msg { color: var(--warn); }
  .log-line.info .log-msg { color: var(--accent2); }

  /* Preview area */
  .preview-area {
    padding: 0 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .preview-clips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .preview-thumb {
    position: relative;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--surface2);
  }
  .preview-thumb video {
    display: block;
    width: 120px;
    height: 68px;
    object-fit: cover;
  }
  .preview-thumb-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.7);
    font-size: 10px;
    padding: 2px 6px;
    color: var(--muted);
  }
  .final-video-wrap {
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border-active);
    background: var(--surface2);
  }
  .final-video-wrap video {
    width: 100%;
    max-height: 220px;
    display: block;
  }
  .final-label {
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .hint { font-size: 10px; color: var(--muted); margin-top: 4px; line-height: 1.5; }

  /* Image upload */
  .upload-zone {
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s;
    position: relative;
  }
  .upload-zone:hover { border-color: var(--border-active); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-zone img { max-width: 100%; max-height: 100px; border-radius: 4px; display: none; margin: 0 auto; }
  .upload-zone-text { font-size: 11px; color: var(--muted); }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="shell">

  <header>
    <div class="logo">RunwayMaker <span>/ multi-clip</span></div>
    <div class="header-status">
      <div class="dot" id="api-dot"></div>
      <span id="api-status-text">API未確認</span>
    </div>
  </header>

  <aside>
    <!-- API Key -->
    <div>
      <div class="section-label">API設定</div>
      <div class="field">
        <label>Runway API Key</label>
        <input type="password" id="apiKey" placeholder="rw-xxxxxxxxxxxx" oninput="checkApiKey()" />
      </div>
    </div>

    <!-- Image -->
    <div>
      <div class="section-label">元画像</div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" accept="image/*" onchange="handleImageUpload(event)" />
        <img id="previewImg" />
        <div class="upload-zone-text" id="uploadText">クリックして画像を選択</div>
      </div>
    </div>

    <!-- Global settings -->
    <div>
      <div class="section-label">動画設定</div>
      <div class="field">
        <label>解像度</label>
        <select id="ratio">
          <option value="1280:768">1280×768（横長）</option>
          <option value="768:1280">768×1280（縦長）</option>
          <option value="960:960">960×960（正方形）</option>
          <option value="1104:832">1104×832</option>
        </select>
      </div>
      <div class="field">
        <label>各クリップの長さ</label>
        <select id="clipDuration">
          <option value="5">5秒</option>
          <option value="10" selected>10秒</option>
        </select>
      </div>
      <div class="field">
        <label>つなぎ方</label>
        <div class="toggle-row">
          <button class="toggle-btn active" onclick="setTransition('crossfade', this)">クロスフェード</button>
          <button class="toggle-btn" onclick="setTransition('cut', this)">カット</button>
        </div>
        <p class="hint">※ クロスフェードはffmpegがブラウザ外で必要です</p>
      </div>
    </div>

    <!-- Clips -->
    <div style="flex:1">
      <div class="section-label">クリップ一覧</div>
      <div class="clip-list" id="clipList"></div>
      <button class="add-btn" onclick="addClip()" style="margin-top:8px">＋ クリップを追加</button>
    </div>
  </aside>

  <main>
    <div class="main-toolbar">
      <button class="run-btn" id="runBtn" onclick="runAll()" disabled>▶ 全クリップ生成</button>
      <button class="merge-btn" id="mergeBtn" onclick="mergeClips()" disabled>⊕ 結合してダウンロード</button>
      <div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>
      <span class="progress-label" id="progressLabel">0 / 0</span>
    </div>

    <div class="log-area" id="logArea">
      <div class="log-line info">
        <span class="log-time">--:--:--</span>
        <span class="log-msg">Runway Multi-Clip Maker 起動完了</span>
      </div>
      <div class="log-line">
        <span class="log-time">--:--:--</span>
        <span class="log-msg">APIキーを入力し、クリップを追加して「全クリップ生成」を押してください</span>
      </div>
    </div>

    <div class="preview-area">
      <div id="thumbsWrap" style="display:none">
        <div class="section-label" style="margin-bottom:6px">生成済みクリップ</div>
        <div class="preview-clips" id="previewClips"></div>
      </div>
      <div id="finalWrap" style="display:none">
        <div class="final-label">▶ 結合動画</div>
        <div class="final-video-wrap">
          <video id="finalVideo" controls></video>
        </div>
      </div>
    </div>
  </main>

</div>

<script>
// State
let imageBase64 = null;
let imageMediaType = null;
let clips = [];
let clipUrls = [];
let transition = 'crossfade';
let clipIdCounter = 0;

// Init default clips
window.onload = () => {
  addClip('桜の花びらがゆっくり舞い落ちる。カメラはじっとしている。');
  addClip('蝶が画面を横切る。背景の花がそよ風で揺れる。');
  addClip('カメラがゆっくりズームアウト。全体の景色が広がる。');
};

function checkApiKey() {
  const v = document.getElementById('apiKey').value.trim();
  const dot = document.getElementById('api-dot');
  const txt = document.getElementById('api-status-text');
  if (v.length > 10) {
    dot.className = 'dot ok';
    txt.textContent = 'APIキー設定済み';
    updateRunBtn();
  } else {
    dot.className = 'dot';
    txt.textContent = 'APIキー未設定';
    document.getElementById('runBtn').disabled = true;
  }
}

function updateRunBtn() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const ok = apiKey.startsWith('rw-') && apiKey.length > 10 && imageBase64 && clips.length > 0;
  document.getElementById('runBtn').disabled = !ok;
}

function handleImageUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const result = ev.target.result;
    const img = document.getElementById('previewImg');
    img.src = result;
    img.style.display = 'block';
    document.getElementById('uploadText').style.display = 'none';
    const parts = result.split(',');
    imageBase64 = parts[1];
    imageMediaType = file.type;
    log('画像を読み込みました: ' + file.name, 'ok');
    checkApiKey();
    updateRunBtn();
  };
  reader.readAsDataURL(file);
}

function setTransition(t, el) {
  transition = t;
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function addClip(defaultPrompt = '') {
  const id = ++clipIdCounter;
  clips.push({ id, status: 'idle', url: null });

  const div = document.createElement('div');
  div.className = 'clip-row';
  div.id = 'clip-' + id;
  div.innerHTML = `
    <div class="clip-row-header">
      <span class="clip-num">#${clips.length}</span>
      <span class="clip-status" id="status-${id}">待機中</span>
      <button class="del-btn" onclick="removeClip(${id})">✕</button>
    </div>
    <textarea id="prompt-${id}" placeholder="このクリップの動きを記述...">${defaultPrompt}</textarea>
  `;
  document.getElementById('clipList').appendChild(div);
  updateRunBtn();
}

function removeClip(id) {
  clips = clips.filter(c => c.id !== id);
  document.getElementById('clip-' + id)?.remove();
  renumberClips();
  updateRunBtn();
}

function renumberClips() {
  document.querySelectorAll('.clip-num').forEach((el, i) => {
    el.textContent = '#' + (i + 1);
  });
}

function setClipStatus(id, text, cls) {
  const el = document.getElementById('status-' + id);
  if (!el) return;
  el.textContent = text;
  el.className = 'clip-status' + (cls ? ' ' + cls : '');
}

function log(msg, type = '') {
  const area = document.getElementById('logArea');
  const now = new Date();
  const t = now.toTimeString().slice(0,8);
  const div = document.createElement('div');
  div.className = 'log-line' + (type ? ' ' + type : '');
  div.innerHTML = `<span class="log-time">${t}</span><span class="log-msg">${msg}</span>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function setProgress(done, total) {
  const pct = total > 0 ? (done / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = done + ' / ' + total;
}

async function generateClip(clip) {
  const apiKey = document.getElementById('apiKey').value.trim();
  const prompt = document.getElementById('prompt-' + clip.id)?.value.trim() || '';
  const duration = parseInt(document.getElementById('clipDuration').value);
  const ratio = document.getElementById('ratio').value;

  setClipStatus(clip.id, '生成中...', 'running');
  log(`[Clip #${clips.indexOf(clip)+1}] リクエスト送信中...`, 'info');

  const imageDataUrl = `data:${imageMediaType};base64,${imageBase64}`;

  const res = await fetch('https://api.dev.runwayml.com/v1/image_to_video', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`,
      'X-Runway-Version': '2024-11-06'
    },
    body: JSON.stringify({
      model: 'gen4_turbo',
      promptImage: imageDataUrl,
      promptText: prompt,
      duration,
      ratio
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `HTTP ${res.status}`);
  }

  const data = await res.json();
  const taskId = data.id;
  if (!taskId) throw new Error('タスクIDなし');

  log(`[Clip #${clips.indexOf(clip)+1}] タスクID: ${taskId} — ポーリング開始`, '');

  return await pollUntilDone(taskId, apiKey, clip);
}

async function pollUntilDone(taskId, apiKey, clip) {
  return new Promise((resolve, reject) => {
    const interval = setInterval(async () => {
      try {
        const res = await fetch(`https://api.dev.runwayml.com/v1/tasks/${taskId}`, {
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'X-Runway-Version': '2024-11-06'
          }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        if (data.status === 'SUCCEEDED') {
          clearInterval(interval);
          const url = data.output?.[0];
          resolve(url);
        } else if (data.status === 'FAILED') {
          clearInterval(interval);
          reject(new Error(data.failure || '生成失敗'));
        }
      } catch(e) {
        clearInterval(interval);
        reject(e);
      }
    }, 5000);
  });
}

function addThumb(clipIndex, url) {
  const wrap = document.getElementById('thumbsWrap');
  wrap.style.display = 'block';
  const container = document.getElementById('previewClips');
  const div = document.createElement('div');
  div.className = 'preview-thumb';
  div.innerHTML = `
    <video src="${url}" muted loop autoplay playsinline></video>
    <div class="preview-thumb-label">clip_${String(clipIndex+1).padStart(2,'0')}.mp4</div>
  `;
  container.appendChild(div);
}

async function runAll() {
  if (!imageBase64) { log('画像をアップロードしてください', 'err'); return; }
  if (clips.length === 0) { log('クリップを追加してください', 'err'); return; }

  clipUrls = [];
  document.getElementById('previewClips').innerHTML = '';
  document.getElementById('thumbsWrap').style.display = 'none';
  document.getElementById('finalWrap').style.display = 'none';
  document.getElementById('runBtn').disabled = true;
  document.getElementById('mergeBtn').disabled = true;

  log(`--- ${clips.length} クリップの生成を開始 ---`, 'info');
  setProgress(0, clips.length);

  let done = 0;
  for (let i = 0; i < clips.length; i++) {
    const clip = clips[i];
    try {
      const url = await generateClip(clip);
      clip.url = url;
      clipUrls.push({ url, index: i });
      setClipStatus(clip.id, '完了', 'done');
      log(`[Clip #${i+1}] 完了 ✓`, 'ok');
      addThumb(i, url);
      done++;
      setProgress(done, clips.length);
    } catch(e) {
      setClipStatus(clip.id, 'エラー', 'error');
      log(`[Clip #${i+1}] エラー: ${e.message}`, 'err');
      clipUrls.push(null);
      done++;
      setProgress(done, clips.length);
    }
  }

  log(`--- 生成完了: ${clipUrls.filter(Boolean).length}/${clips.length} 成功 ---`, 'ok');
  document.getElementById('runBtn').disabled = false;
  const successUrls = clipUrls.filter(c => c && c.url);
  if (successUrls.length > 0) {
    document.getElementById('mergeBtn').disabled = false;
  }
}

async function mergeClips() {
  const successClips = clipUrls.filter(c => c && c.url);
  if (successClips.length === 0) { log('結合できるクリップがありません', 'err'); return; }

  log(`--- ${successClips.length} クリップを結合中 (${transition}) ---`, 'info');
  document.getElementById('mergeBtn').disabled = true;

  try {
    // Fetch all videos as blobs
    log('各クリップをダウンロード中...', '');
    const blobs = [];
    for (let i = 0; i < successClips.length; i++) {
      log(`  ダウンロード中: clip_${String(i+1).padStart(2,'0')}.mp4`, '');
      const r = await fetch(successClips[i].url);
      const blob = await r.blob();
      blobs.push(blob);
    }

    if (transition === 'cut') {
      // Simple concatenation via MediaSource or just play sequentially
      // For browser-only cut: create a playlist-style player
      log('カット結合: プレイヤーを構築中...', '');
      await buildCutPlayer(blobs, successClips);
    } else {
      // Crossfade: use canvas-based merge
      log('クロスフェード: Canvas合成中...', '');
      await buildCrossfadePlayer(blobs, successClips);
    }

    log('結合完了！プレビューをご確認ください', 'ok');
  } catch(e) {
    log('結合エラー: ' + e.message, 'err');
  }
  document.getElementById('mergeBtn').disabled = false;
}

// Cut: sequential playback player
async function buildCutPlayer(blobs, clips) {
  const urls = blobs.map(b => URL.createObjectURL(b));
  const finalWrap = document.getElementById('finalWrap');
  const finalVideo = document.getElementById('finalVideo');

  let current = 0;
  finalVideo.src = urls[0];
  finalVideo.onended = () => {
    current++;
    if (current < urls.length) {
      finalVideo.src = urls[current];
      finalVideo.play();
      log(`  → Clip ${current+1} へ切り替え`, '');
    } else {
      log('全クリップ再生完了', 'ok');
    }
  };
  finalWrap.style.display = 'block';

  // Download button for individual clips
  const dlWrap = document.createElement('div');
  dlWrap.style.cssText = 'display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;';
  urls.forEach((u, i) => {
    const a = document.createElement('a');
    a.href = u;
    a.download = `clip_${String(i+1).padStart(2,'0')}.mp4`;
    a.style.cssText = `
      font-family:var(--mono);font-size:11px;
      background:var(--surface2);border:1px solid var(--border);
      border-radius:5px;padding:5px 10px;color:var(--muted);
      text-decoration:none;transition:border-color 0.15s;
    `;
    a.textContent = `↓ clip_${String(i+1).padStart(2,'0')}.mp4`;
    a.onmouseover = () => a.style.borderColor = 'var(--border-active)';
    a.onmouseout = () => a.style.borderColor = 'var(--border)';
    dlWrap.appendChild(a);
  });
  finalWrap.appendChild(dlWrap);

  log('カット結合プレイヤー構築完了（各ファイルも個別DL可能）', 'ok');
}

// Crossfade via Canvas
async function buildCrossfadePlayer(blobs, clips) {
  const FADE_DURATION = 0.8; // seconds overlap
  const urls = blobs.map(b => URL.createObjectURL(b));

  const finalWrap = document.getElementById('finalWrap');
  finalWrap.style.display = 'block';

  // Setup canvas
  const existingCanvas = document.getElementById('mergeCanvas');
  if (existingCanvas) existingCanvas.remove();
  const canvas = document.createElement('canvas');
  canvas.id = 'mergeCanvas';
  canvas.style.cssText = 'width:100%;max-height:220px;display:block;background:#000;';
  const oldVideo = document.getElementById('finalVideo');
  oldVideo.style.display = 'none';
  finalWrap.insertBefore(canvas, finalWrap.firstChild);

  // Load all video elements
  const videos = await Promise.all(urls.map((url, i) => {
    return new Promise(resolve => {
      const v = document.createElement('video');
      v.src = url;
      v.muted = true;
      v.preload = 'auto';
      v.onloadedmetadata = () => resolve(v);
    });
  }));

  if (videos.length === 0) return;
  canvas.width = videos[0].videoWidth || 1280;
  canvas.height = videos[0].videoHeight || 768;
  const ctx = canvas.getContext('2d');

  let currentIdx = 0;
  let nextIdx = 1;
  let transitioning = false;
  let transitionStart = 0;
  let transitionAlpha = 0;

  const startVideo = async (v) => {
    v.currentTime = 0;
    await v.play().catch(() => {});
  };

  await startVideo(videos[0]);

  const render = () => {
    if (currentIdx >= videos.length) return;
    const cur = videos[currentIdx];
    const timeLeft = cur.duration - cur.currentTime;

    if (!transitioning && nextIdx < videos.length && timeLeft <= FADE_DURATION) {
      transitioning = true;
      transitionStart = performance.now();
      transitionAlpha = 0;
      startVideo(videos[nextIdx]);
      log(`  → Clip ${currentIdx+1} → ${currentIdx+2} クロスフェード開始`, '');
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = 1;
    if (!cur.paused && !cur.ended) ctx.drawImage(cur, 0, 0, canvas.width, canvas.height);

    if (transitioning && nextIdx < videos.length) {
      const elapsed = (performance.now() - transitionStart) / 1000;
      transitionAlpha = Math.min(elapsed / FADE_DURATION, 1);
      ctx.globalAlpha = transitionAlpha;
      const nxt = videos[nextIdx];
      if (!nxt.paused) ctx.drawImage(nxt, 0, 0, canvas.width, canvas.height);
      ctx.globalAlpha = 1;

      if (transitionAlpha >= 1) {
        cur.pause();
        currentIdx = nextIdx;
        nextIdx++;
        transitioning = false;
        if (currentIdx >= videos.length) {
          log('全クリップ再生完了', 'ok');
          return;
        }
      }
    }

    requestAnimationFrame(render);
  };
  requestAnimationFrame(render);

  // Download links
  const dlWrap = document.createElement('div');
  dlWrap.style.cssText = 'display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;';
  urls.forEach((u, i) => {
    const a = document.createElement('a');
    a.href = u;
    a.download = `clip_${String(i+1).padStart(2,'0')}.mp4`;
    a.style.cssText = `font-family:var(--mono);font-size:11px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:5px 10px;color:var(--muted);text-decoration:none;`;
    a.textContent = `↓ clip_${String(i+1).padStart(2,'0')}.mp4`;
    dlWrap.appendChild(a);
  });
  finalWrap.appendChild(dlWrap);
}
</script>
